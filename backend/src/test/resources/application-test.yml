# Test profile configuration
# Testcontainers overrides spring.datasource via @DynamicPropertySource

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true

# Disable Spring Boot's built-in mail health contributor in tests.
# We have our own MailHealthIndicator; the auto one fails when JavaMailSender is mocked.
management:
  health:
    mail:
      enabled: false

logging:
  file:
    name: /tmp/library-test.log
  level:
    root: WARN
    com.library: DEBUG
    org.flywaydb: INFO
