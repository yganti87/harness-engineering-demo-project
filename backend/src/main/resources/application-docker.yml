# Docker profile — overrides application.yml when SPRING_PROFILES_ACTIVE=docker
# The DB hostname is "db" (Docker Compose service name / DNS)

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${DB_NAME:library_db}
    username: ${DB_USER:library_user}
    password: ${DB_PASSWORD:library_pass}
