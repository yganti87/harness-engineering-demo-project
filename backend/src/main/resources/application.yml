spring:
  application:
    name: library-backend

  # ── DataSource (overridden by application-docker.yml) ─────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5433/library_db
    username: library_user
    password: library_pass
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ── JPA / Hibernate ────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate  # Schema managed by Flyway; Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  # ── Flyway ─────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  # ── Mail ───────────────────────────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${MAIL_STARTTLS_ENABLED:false}

# ── Server ─────────────────────────────────────────────────────────────────
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# ── Actuator ───────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,logfile,flyway,env
  endpoint:
    health:
      show-details: always
    logfile:
      enabled: true
      external-file: /var/log/app/app.log

# ── JWT + Mail + Verification ──────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-in-production-min-256-bits-for-hs256}
    expiry-minutes: ${JWT_EXPIRY_MINUTES:60}
  mail:
    from-address: ${MAIL_FROM_ADDRESS:noreply@library.local}
  verification:
    token-expiry-minutes: ${VERIFICATION_TOKEN_EXPIRY_MINUTES:15}
    resend-cooldown-seconds: 60
    base-url: ${VERIFICATION_BASE_URL:http://localhost:8080}

# ── Logging (Structured JSON to file) ─────────────────────────────────────
logging:
  file:
    name: /var/log/app/app.log
  level:
    root: ${LOG_LEVEL:INFO}
    com.library: ${LOG_LEVEL:INFO}
    org.hibernate.SQL: WARN
    org.springframework.web: INFO

# ── SpringDoc OpenAPI ──────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    operations-sorter: alpha
  info:
    title: Library API
    description: Library catalog REST API
    version: "0.1.0"
